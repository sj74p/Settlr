name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    name: Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Static analysis ────────────────────────────────────────────────────
      - name: Lint
        run: npm run lint

      # ── Type check (catches issues before tests run) ───────────────────────
      - name: Type check
        run: npx tsc --noEmit

      # ── Unit & BDD tests (no Supabase required) ────────────────────────────
      - name: Run unit tests
        run: npx vitest run --reporter=verbose --exclude='**/supabase-connection*'

      # ── Property-based tests ───────────────────────────────────────────────
      - name: Run property tests
        run: npx vitest run tests/properties.test.ts --reporter=verbose

      # ── Integration: Supabase connection (requires secrets) ────────────────
      - name: Run integration tests
        if: ${{ secrets.VITE_SUPABASE_URL != '' }}
        run: npx vitest run tests/supabase-connection.test.ts --reporter=verbose
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # ── Production build (validates Vite + TypeScript bundle) ─────────────
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # ── Upload build artifact (available for 7 days) ──────────────────────
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
